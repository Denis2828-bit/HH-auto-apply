<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 350px;
            padding: 15px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f7;
        }

        h3 {
            color: #2c3e50;
            margin-top: 0;
            border-bottom: 2px solid #ff4343;
            padding-bottom: 5px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 13px;
            color: #555;
        }

        input,
        textarea {
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 15px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        button {
            width: 100%;
            background-color: #ff4343;
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #e03a3a;
        }

        .status {
            font-size: 12px;
            color: #666;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <h3>HH Auto-Applier</h3>

    <label for="keywords">Ключевые слова (через запятую):</label>
    <input type="text" id="keywords" placeholder="Например: QA, PHP, Senior">

    <label for="minSalary">Минимальная зарплата:</label>
    <input type="number" id="minSalary" placeholder="Например: 500000">

    <label for="coverLetter">Сопроводительное письмо:</label>
    <textarea id="coverLetter" placeholder="Здравствуйте! Меня заинтересовала ваша вакансия..."></textarea>

    <label for="city">Город (например: Алматы):</label>
    <input type="text" id="city" placeholder="Оставь пустым, если не важно">

    <button id="saveBtn">СОХРАНИТЬ И ЗАПУСТИТЬ</button>

    <div class="status" id="statusMsg">Бот готов к работе</div>

    <script src="popup.js"></script>
</body>

</html>
